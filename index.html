<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arbéliang — Apprentissage sérieux des langues</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topbar">
    <div class="brand" id="brand"><span class="leaf">🌳</span> Arbéliang</div>

    <div class="lang-level-group">
      <div style="position:relative;">
        <button class="flag-btn" id="flagBtn">
          <span class="flag-emoji" id="flagEmoji">🇸🇪</span>
          <span id="flagName">Svenska</span>
          <span class="chev">▾</span>
        </button>
        <div class="dropdown" id="langDropdown"></div>
      </div>

      <div style="position:relative;">
        <button class="level-btn" id="levelBtn">
          <span id="levelLabel">Débutant</span>
          <span class="chev">▾</span>
        </button>
        <div class="dropdown" id="levelDropdown"></div>
      </div>
    </div>

    <div class="topbar-right">
      <div class="points-pill">✨ <span id="pointsVal">0</span></div>
      <button class="hub-btn" id="hubBtn">
        🧭 Hub de révisions
        <span class="badge hidden" id="hubBadge">0</span>
      </button>
    </div>
  </div>

  <div id="root"></div>

  <script src="app.js"></script>
</body>
</html>
